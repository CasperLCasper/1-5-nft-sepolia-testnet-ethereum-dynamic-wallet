<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dynamic Wallet Visualizer</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    body { font-family:'Inter',Arial,sans-serif; background:#000; color:#fff; margin:0; padding:20px; position: relative; }
    .container { max-width:1400px; margin:auto; display:flex; flex-direction:column; align-items:center; gap:12px; }
    h1 { font-size:24px; margin:0; line-height:1; background:linear-gradient(90deg,#ffffff,#aaaaaa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; }
    .subtitle { margin-top:4px; color:#9fb0c3; font-size:18px; text-align:center; }
    
    .theme-selector {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 10px 0;
      flex-wrap: wrap;
    }
    .theme-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 2px solid;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
    }
    .theme-btn:hover { transform: translateY(-2px) scale(1.05); }
    .theme-btn.active { background: rgba(255,255,255,0.2); box-shadow: 0 0 15px currentColor; transform: scale(1.02); }
    .theme-btn.active::before { content: '✓ '; font-weight: bold; }
    .theme-classic { border-color: #0ff; color: #0ff; }
    .theme-forest { border-color: #0f0; color: #0f0; }
    .theme-ocean { border-color: #00f; color: #00f; }
    .theme-sunset { border-color: #ff6600; color: #ff6600; }
    .theme-galaxy { border-color: #c026ff; color: #c026ff; }
    .theme-rainbow { border-color: #ff00ff; color: #ff00ff; }
    .theme-fire { border-color: #ff4400; color: #ff4400; }
    
    .active-style-indicator {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      z-index: 100;
      border-left: 4px solid;
      pointer-events: none;
      font-family: monospace;
    }
    
    .controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    button { padding:12px 20px; border-radius:12px; border:none; cursor:pointer; background:linear-gradient(90deg,#4a90e2,#9013fe); color:#fff; font-weight:700; font-size:16px; box-shadow:0 6px 18px rgba(0,0,0,0.45); transition: transform 0.2s, box-shadow 0.2s; }
    button:disabled { background:#444; cursor:not-allowed; opacity:0.5; }
    button:hover:not(:disabled) { transform:translateY(-4px) scale(1.03); box-shadow:0 8px 22px rgba(0,0,0,0.65); }
    
    button.loading { opacity: 0.7; cursor: wait; transform: none !important; }
    button.loading::after {
      content: '';
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-left: 10px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .generate-nft-btn { background: linear-gradient(135deg, #ffffff, #e8f4f0); color: #000; }
    .generate-nft-btn:hover:not(:disabled) { background: linear-gradient(135deg, #d4fcec, #b8f5e0); color: #000; box-shadow: 0 8px 22px rgba(0,255,204,0.2); }
    .generate-nft-btn.loading::after { border-top-color: #000; }
    
    .snapshot-container { width:100%; background:#000; border-radius:14px; padding:18px; box-shadow:0 12px 40px rgba(0,0,0,0.6); position:relative; }
    #snapshotCanvas { width:100%; border-radius:10px; border:1px solid rgba(255,255,255,0.03); display:block; margin-bottom:12px; }
    #recordTimer { margin-top:6px; color:#0ff; font-weight:600; font-size:16px; text-align:center; }
    #statusContainer { position: relative; width: 100%; height: 40px; margin-top: 8px; }
    .status { font-weight:600; font-size:16px; color:#fff; line-height:40px; text-align:center; }
    #progressBarContainer { position: absolute; top: 50%; left: 50%; width: 60%; height: 18px; background: rgba(255,255,255,0.1); border-radius: 6px; transform: translate(-50%, -50%); display: none; overflow: hidden; }
    #progressBar { height: 100%; width: 100%; background: linear-gradient(90deg,#0ff,#4a90e2); border-radius: 6px; transform: scaleX(0); transform-origin: left center; transition: transform 0.4s ease; }
    #fullscreenIcon { position:absolute; top:10px; right:10px; display:flex; align-items:center; cursor:pointer; color:#0ff; background:rgba(0,0,0,0.3); border-radius:6px; padding:6px 10px; transition: background 0.2s, transform 0.2s; z-index:10; }
    #fullscreenIcon:hover { background:rgba(0,255,255,0.2); transform: scale(1.05); }
    #toggleInfoIcon { position:absolute; top:10px; left:10px; display:flex; align-items:center; cursor:pointer; color:#0ff; background:rgba(0,0,0,0.3); border-radius:6px; padding:6px 10px; transition: background 0.2s, transform 0.2s; z-index:10; }
    #toggleInfoIcon:hover { background:rgba(0,255,255,0.2); transform: scale(1.05); }
    #accountDisplay { width:100%; word-break:break-word; margin-top:8px; font-size:16px; text-align:center; }

    .warning-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #f59e0b;
      color: #000;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      z-index: 200;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }
    .warning-banner.show { transform: translateY(0); }

    #tokenListContainer {
      display:none;
      position:absolute;
      top:80px;
      left:10px;
      max-height:150px;
      width:90%;
      max-width:576px;
      background:rgba(0,0,0,0.5);
      border-radius:9px;
      overflow-y:auto;
      padding:10px;
      font-size:14px;
      z-index:15;
    }
    #tokenListContainer table { width:100%; border-collapse:collapse; }
    #tokenListContainer th, #tokenListContainer td { padding:6px 8px; text-align:left; font-size:13px; }
    #tokenListContainer th { color:#0ff; font-weight:600; }
    #tokenListContainer tr:nth-child(even) td { background:rgba(255,255,255,0.05); }
    #tokenListContainer tr:nth-child(odd) td { background:rgba(255,255,255,0.02); }
    #tokenListContainer::-webkit-scrollbar { width:6px; }
    #tokenListContainer::-webkit-scrollbar-thumb { background:#0ff; border-radius:3px; }

    .site-header { position: relative; width: 100%; min-height: 80px; }
    .logo { position: absolute; top: 0px; left: 10px; width: 280px; height: auto; }
    .header-text { text-align: center; padding-top: 5px; }
    
    @media (max-width: 768px) {
      .logo { position: static; display: block; margin: 0 auto 20px auto; width: 140px; }
      .header-text { padding-top: 0; }
      .site-header { min-height: auto; }
    }
    
    .ipfs-preview {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.8);
      border: 1px solid #0ff;
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      max-width: 300px;
      z-index: 100;
      display: none;
    }
    .ipfs-preview a { color: #0ff; word-break: break-all; }
  </style>
</head>

<body>
  <div class="warning-banner" id="warningBanner">
    ⚠️ Please do not close this tab while recording video! ⚠️
  </div>

  <div class="container">
    <header class="site-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="160" height="40" viewBox="0 0 158.74999 37.041668" class="logo">
        <text xml:space="preserve" style="font-style:normal;font-weight:normal;font-size:14.1111px;line-height:1.25;font-family:sans-serif;fill:#ffffff;fill-opacity:1;stroke:none;stroke-width:0.264583;" x="8.8499603" y="31.493832">
          <tspan x="8.8499603" y="31.493832" style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14.1111px;font-family:'DejaVu Sans Mono';-inkscape-font-specification:'DejaVu Sans Mono';stroke-width:0.264583;fill:#ffffff;">V I R S B U R T S</tspan>
        </text>
        <rect style="fill:#ffffff;stroke-width:0.264583" width="3.1013243" height="15.020124" x="5.9450045" y="3.8351295" />
      </svg>
      <div class="header-text">
        <h1>Dynamic Wallet Visualizer</h1>
        <p class="subtitle">Watch your Ethereum assets come alive</p>
      </div>
    </header>

    <div class="theme-selector">
      <button class="theme-btn theme-classic active" data-theme="classic">⭐ CLASSIC</button>
      <button class="theme-btn theme-forest" data-theme="forest">🌲 FOREST</button>
      <button class="theme-btn theme-ocean" data-theme="ocean">🌊 OCEAN</button>
      <button class="theme-btn theme-sunset" data-theme="sunset">🌅 SUNSET</button>
      <button class="theme-btn theme-galaxy" data-theme="galaxy">✨ GALAXY</button>
      <button class="theme-btn theme-rainbow" data-theme="rainbow">🌈 RAINBOW</button>
      <button class="theme-btn theme-fire" data-theme="fire">🔥 FIRE</button>
    </div>

    <div class="controls">
      <button id="connectBtn">Connect Wallet</button>
      <button id="renderBtn" disabled>Render Snapshot</button>
      <button id="recordBtn" disabled>Record 20s HD Video</button>
      <button id="generateNFTBtn" class="generate-nft-btn" disabled>Generate NFT</button>
    </div>

    <div id="accountDisplay">Connected account: —</div>
    <div id="statusContainer">
      <div id="statusMsg" class="status"></div>
      <div id="progressBarContainer"><div id="progressBar"></div></div>
    </div>
    <div id="recordTimer">Recording: 0 / 20 s</div>

    <div class="snapshot-container">
      <canvas id="snapshotCanvas" width="1920" height="1080"></canvas>
      <div id="fullscreenIcon">⤢ <span>Fullscreen</span></div>
      <div id="toggleInfoIcon">ℹ <span>Info</span></div>
      <div id="tokenListContainer">
        <table>
          <thead><tr><th>Address</th><th>Balance</th></tr></thead>
          <tbody id="tokenListContent"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="ipfsPreview" class="ipfs-preview" style="display:none;">
    <strong>IPFS Links:</strong><br>
    <span id="previewImage"></span><br>
    <span id="previewVideo"></span><br>
    <span id="previewMetadata"></span>
  </div>

  <div id="styleIndicator" class="active-style-indicator" style="border-left-color: #0ff;">
    <span id="indicatorText">⭐ CLASSIC MODE - Original visualization</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>

  <script>
    // ============================================ //
    // APP OBJECT - Iekapsulēšana
    // ============================================ //
    const App = {
      // State
      provider: null,
      signer: null,
      account: null,
      showInfo: true,
      tokens: [],
      ethBalance: 0,
      txCount: 0,
      particles: [],
      initialParticles: [],
      animRequest: null,
      currentAddonStyle: 'classic',
      frameCount: 0,
      isRecording: false,
      
      // NFT dati (saglabāti, bet vēlāk izmantos)
      lastImageURL: null,
      lastVideoURL: null,
      lastMetadataURL: null,
      recordedVideoBlob: null,
      
      // DOM elementi
      canvas: null,
      ctx: null,
      connectBtn: null,
      renderBtn: null,
      recordBtn: null,
      generateNFTBtn: null,
      accountDisplay: null,
      recordTimer: null,
      statusMsg: null,
      progressBarContainer: null,
      progressBar: null,
      tokenListContainer: null,
      tokenListContent: null,
      ipfsPreview: null,
      previewImage: null,
      previewVideo: null,
      previewMetadata: null,
      styleIndicator: null,
      indicatorText: null,
      warningBanner: null,
      
      // Mobilā optimizācija
      getCanvasDimensions() {
        const isMobile = /Mobi|Android/i.test(navigator.userAgent);
        const dpr = Math.min(window.devicePixelRatio || 1, isMobile ? 2 : 3);
        let width = 1920;
        let height = 1080;
        
        if (isMobile) {
          width = Math.min(1080, window.innerWidth * dpr);
          height = Math.min(720, window.innerHeight * dpr);
        }
        
        return { width, height, dpr, isMobile };
      },
      
      resizeCanvas() {
        const { width, height, dpr, isMobile } = this.getCanvasDimensions();
        const scale = isMobile ? 0.5 : 1;
        
        this.canvas.width = Math.round(width * scale);
        this.canvas.height = Math.round(height * scale);
        this.canvas.style.width = '100%';
        this.canvas.style.height = 'auto';
        
        this.ctx.setTransform(1, 0, 0, 1, 0, 0);
        this.ctx.scale(dpr * scale, dpr * scale);
      },
      
      cleanup() {
        if (this.animRequest) {
          cancelAnimationFrame(this.animRequest);
          this.animRequest = null;
        }
        this.particles = [];
        this.initialParticles = [];
        if (this.ctx) {
          this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        }
      },
      
      showWarning(message, show = true) {
        if (this.warningBanner) {
          this.warningBanner.textContent = message;
          if (show) {
            this.warningBanner.classList.add('show');
          } else {
            this.warningBanner.classList.remove('show');
          }
        }
      },
      
      showToast(message, type = 'info') {
        this.statusMsg.textContent = message;
        console.log(`[${type}] ${message}`);
      },
      
      showProgress() { this.progressBarContainer.style.display = 'block'; this.progressBar.style.transform = 'scaleX(0)'; },
      hideProgress() { 
        this.progressBar.style.transform = 'scaleX(1)'; 
        setTimeout(() => { 
          this.progressBarContainer.style.display = 'none'; 
          this.progressBar.style.transform = 'scaleX(0)'; 
        }, 500); 
      },
      setProgress(percent) { this.progressBar.style.transform = `scaleX(${percent / 100})`; },
      
      setButtonLoading(button, isLoading) { 
        if (isLoading) { button.classList.add('loading'); button.disabled = true; } 
        else { button.classList.remove('loading'); button.disabled = false; } 
      },
      
      // Tēmas
      ADDON_STYLES: {
        classic: { name: 'CLASSIC', displayName: '⭐ CLASSIC', color: '#0ff',
          particleColorModifier: (hue, sat, light, idx, balanceFactor) => ({ hue, sat, light }),
          drawExtraEffects: (ctx, W, H, frame, particles, cx0, cy0) => {},
          connectionColorModifier: (hue, sat, light, alpha) => ({ hue, sat, light, alpha }),
          indicatorText: '⭐ CLASSIC MODE - Original visualization' },
        forest: { name: 'FOREST', displayName: '🌲 FOREST', color: '#0f0',
          particleColorModifier: (hue, sat, light, idx, balanceFactor) => ({ hue: (hue + 120) % 360, sat: Math.min(100, sat + 20), light: light - 10 }),
          drawExtraEffects: (ctx, W, H, frame, particles, cx0, cy0) => {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            particles.forEach(p => {
              const cx = cx0 + Math.cos(p.angle) * p.radius;
              const cy = cy0 + Math.sin(p.angle) * p.radius;
              ctx.beginPath();
              ctx.arc(cx, cy, p.r * 1.8, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(0, 255, 0, 0.15)`;
              ctx.fill();
            });
            ctx.restore();
          },
          connectionColorModifier: (hue, sat, light, alpha) => ({ hue: (hue + 120) % 360, sat: Math.min(100, sat + 20), light: light - 10, alpha: alpha * 0.8 }),
          indicatorText: '🌲 FOREST MODE - Green glow effect active' },
        ocean: { name: 'OCEAN', displayName: '🌊 OCEAN', color: '#00f',
          particleColorModifier: (hue, sat, light, idx, balanceFactor) => ({ hue: (hue + 200) % 360, sat: Math.min(100, sat + 15), light: light + 5 }),
          drawExtraEffects: (ctx, W, H, frame, particles, cx0, cy0) => {
            ctx.save();
            ctx.globalAlpha = 0.25;
            for(let i = 0; i < 5; i++) {
              ctx.beginPath();
              ctx.arc(W/2 + Math.sin(frame * 0.02 + i) * 50, H/2 + Math.cos(frame * 0.015 + i) * 30, 100 + i * 30, 0, Math.PI * 2);
              ctx.strokeStyle = `rgba(0, 100, 255, ${0.15 - i * 0.02})`;
              ctx.stroke();
            }
            ctx.restore();
          },
          connectionColorModifier: (hue, sat, light, alpha) => ({ hue: (hue + 200) % 360, sat: Math.min(100, sat + 15), light: light + 5, alpha: alpha * 0.9 }),
          indicatorText: '🌊 OCEAN MODE - Wave animations active' },
        sunset: { name: 'SUNSET', displayName: '🌅 SUNSET', color: '#ff6600',
          particleColorModifier: (hue, sat, light, idx, balanceFactor) => ({ hue: (hue + 30) % 360, sat: Math.min(100, sat + 25), light: light + 15 }),
          drawExtraEffects: (ctx, W, H, frame, particles, cx0, cy0) => {
            ctx.save();
            const gradient = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 350);
            gradient.addColorStop(0, 'rgba(255, 100, 0, 0.2)');
            gradient.addColorStop(0.5, 'rgba(255, 50, 0, 0.1)');
            gradient.addColorStop(1, 'rgba(255, 100, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            ctx.restore();
          },
          connectionColorModifier: (hue, sat, light, alpha) => ({ hue: (hue + 30) % 360, sat: Math.min(100, sat + 25), light: light + 15, alpha: alpha * 1.1 }),
          indicatorText: '🌅 SUNSET MODE - Warm fire glow active' },
        galaxy: { name: 'GALAXY', displayName: '✨ GALAXY', color: '#c026ff',
          particleColorModifier: (hue, sat, light, idx, balanceFactor) => ({ hue: (hue + 280) % 360, sat: Math.min(100, sat + 30), light: light + 10 }),
          drawExtraEffects: (ctx, W, H, frame, particles, cx0, cy0) => {
            ctx.save();
            for(let i = 0; i < 60; i++) {
              const x = (Math.sin(frame * 0.01 + i) * 0.5 + 0.5) * W;
              const y = (Math.cos(frame * 0.008 + i * 2) * 0.5 + 0.5) * H;
              ctx.beginPath();
              ctx.arc(x, y, 1.5 + Math.sin(frame * 0.05 + i) * 0.8, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(200, 100, 255, ${0.3 + Math.sin(frame * 0.03 + i) * 0.2})`;
              ctx.fill();
            }
            ctx.restore();
          },
          connectionColorModifier: (hue, sat, light, alpha) => ({ hue: (hue + 280) % 360, sat: Math.min(100, sat + 30), light: light + 10, alpha: alpha * 0.85 }),
          indicatorText: '✨ GALAXY MODE - Sparkle stars active' },
        rainbow: { name: 'RAINBOW', displayName: '🌈 RAINBOW', color: '#ff00ff',
          particleColorModifier: (hue, sat, light, idx, balanceFactor) => ({ hue: (hue + idx * 15 + this.frameCount * 2) % 360, sat: 100, light: 70 }),
          drawExtraEffects: (ctx, W, H, frame, particles, cx0, cy0) => {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            particles.forEach((p, i) => {
              const pulse = Math.sin(frame * 0.05 + i) * 0.4 + 0.5;
              const cx = cx0 + Math.cos(p.angle) * p.radius;
              const cy = cy0 + Math.sin(p.angle) * p.radius;
              ctx.beginPath();
              ctx.arc(cx, cy, p.r * (1 + pulse * 0.6), 0, Math.PI * 2);
              ctx.fillStyle = `hsla(${(p.hue + frame) % 360}, 100%, 70%, ${pulse * 0.3})`;
              ctx.fill();
            });
            ctx.restore();
          },
          connectionColorModifier: (hue, sat, light, alpha) => ({ hue: (hue + this.frameCount * 2) % 360, sat: 100, light: 70, alpha: alpha * 0.7 }),
          indicatorText: '🌈 RAINBOW MODE - Color pulse active' },
        fire: { name: 'FIRE', displayName: '🔥 FIRE', color: '#ff4400',
          particleColorModifier: (hue, sat, light, idx, balanceFactor) => ({ hue: (hue + 15) % 360, sat: Math.min(100, sat + 40), light: light + 20 }),
          drawExtraEffects: (ctx, W, H, frame, particles, cx0, cy0) => {
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            particles.forEach(p => {
              const trailX = cx0 + Math.cos(p.angle - p.speed * 12) * p.radius;
              const trailY = cy0 + Math.sin(p.angle - p.speed * 12) * p.radius;
              ctx.beginPath();
              ctx.moveTo(trailX, trailY);
              const cx = cx0 + Math.cos(p.angle) * p.radius;
              const cy = cy0 + Math.sin(p.angle) * p.radius;
              ctx.lineTo(cx, cy);
              ctx.lineWidth = p.r * 1.2;
              ctx.strokeStyle = `rgba(255, 80, 0, 0.5)`;
              ctx.stroke();
            });
            ctx.restore();
          },
          connectionColorModifier: (hue, sat, light, alpha) => ({ hue: (hue + 15) % 360, sat: Math.min(100, sat + 40), light: light + 20, alpha: alpha * 1.2 }),
          indicatorText: '🔥 FIRE MODE - Fire trail effects active' }
      },
      
      setAddonStyle(styleName) {
        this.currentAddonStyle = styleName;
        const style = this.ADDON_STYLES[styleName];
        this.styleIndicator.style.borderLeftColor = style.color;
        this.indicatorText.innerHTML = style.indicatorText;
        this.styleIndicator.style.transform = 'scale(1.05)';
        setTimeout(() => { this.styleIndicator.style.transform = 'scale(1)'; }, 300);
        if (this.initialParticles.length > 0 && this.animRequest) {
          this.stopAnimation();
          this.particles = this.cloneParticles();
          this.animate();
        }
      },
      
      hashStringToInt(str, mod = 1000) { 
        let h = 2166136261 >>> 0; 
        for (let i = 0; i < str.length; i++) {
          h ^= str.charCodeAt(i);
          h = Math.imul(h, 16777619) >>> 0;
        } 
        return h % mod; 
      },
      
      seededRandomFloat(seedStr) { return this.hashStringToInt(seedStr, 10000) / 10000; },
      
      updateTokenListUI() {
        if(!this.tokens || this.tokens.length === 0){ 
          this.tokenListContent.innerHTML = '<tr><td colspan="2" style="color:#777;">No assets<\/td><\/tr>'; 
          return; 
        }
        this.tokenListContent.innerHTML = '';
        this.tokens.forEach(t => {
          const tr = document.createElement('tr');
          const addrTd = document.createElement('td'); 
          addrTd.textContent = t.address; 
          addrTd.title = t.address;
          const balTd = document.createElement('td'); 
          balTd.textContent = t.isNFT ? t.balance : t.balance.toFixed(4);
          tr.appendChild(addrTd); tr.appendChild(balTd);
          this.tokenListContent.appendChild(tr);
        });
      },
      
      showIPFSPreview(imageURL, videoURL, metadataURL) {
        this.previewImage.innerHTML = ''; 
        this.previewVideo.innerHTML = ''; 
        this.previewMetadata.innerHTML = '';
        if (imageURL) this.previewImage.innerHTML = `🖼️ Image: <a href="${imageURL.http}" target="_blank">${imageURL.ipfs}</a>`;
        if (videoURL) this.previewVideo.innerHTML = `🎬 Video: <a href="${videoURL.http}" target="_blank">${videoURL.ipfs}</a>`;
        if (metadataURL) this.previewMetadata.innerHTML = `📄 Metadata: <a href="${metadataURL.http}" target="_blank">${metadataURL.ipfs}</a>`;
        this.ipfsPreview.style.display = 'block';
        setTimeout(() => { this.ipfsPreview.style.display = 'none'; }, 10000);
      },
      
      async getTokens() {
        if (!this.account) return [];
        this.showProgress();
        try {
          const res = await fetch(`/api/getTokens?account=${encodeURIComponent(this.account)}`);
          if (!res.ok) return [];
          const data = await res.json();
          if (!data?.result?.tokenBalances) return [];
          return data.result.tokenBalances.map(t => {
            const decimals = t.decimals != null ? Number(t.decimals) : 18;
            const balance = Number(ethers.formatUnits(t.tokenBalance || "0x0", decimals));
            const address = (t.contractAddress || "").toLowerCase();
            return { address, balance, symbol: t.symbol || address, isNFT: false };
          }).filter(t => t.balance > 0);
        } catch(e) { console.error(e); return []; } finally { this.hideProgress(); }
      },
      
      async getAllNFTs() {
        if (!this.account) return [];
        this.showProgress();
        try {
          const res = await fetch(`/api/getAllNFTs?account=${encodeURIComponent(this.account)}`);
          if (!res.ok) return [];
          const data = await res.json();
          let nfts = [];
          if (data?.result?.nfts) nfts = data.result.nfts;
          else if (data?.nfts) nfts = data.nfts;
          else if (Array.isArray(data)) nfts = data;
          if (!nfts || !nfts.length) return [];
          return nfts.map(nft => ({
            address: nft.contract?.address || nft.contractAddress || nft.address || '',
            symbol: nft.contract?.symbol || nft.symbol || 'NFT',
            balance: 1,
            isNFT: true,
            tokenId: nft.id?.tokenId || nft.tokenId || nft.id || ''
          }));
        } catch(e) { console.error(e); return []; } finally { this.hideProgress(); }
      },
      
      async connectWallet() {
        this.setButtonLoading(this.connectBtn, true);
        this.showProgress();
        try {
          if (window.ethereum) {
            this.provider = new ethers.BrowserProvider(window.ethereum);
            await this.provider.send("eth_requestAccounts", []);
            this.signer = await this.provider.getSigner();
            this.account = await this.signer.getAddress();
          } else { alert('Please install MetaMask!'); return; }
          this.accountDisplay.textContent = 'Connected account: ' + this.account;
          const balance = await this.provider.getBalance(this.account);
          this.ethBalance = Number(ethers.formatEther(balance));
          this.renderBtn.disabled = false;
          this.recordBtn.disabled = false;
          this.generateNFTBtn.disabled = false;
          this.statusMsg.textContent = 'Wallet connected';
          this.showToast('Wallet connected successfully!', 'success');
        } catch (err) { console.error(err); this.statusMsg.textContent = 'Connection failed'; alert('Wallet connection failed'); } finally { this.setButtonLoading(this.connectBtn, false); this.hideProgress(); }
      },
      
      async uploadFileToIPFS(file) {
        const formData = new FormData();
        formData.append('file', file);
        const response = await fetch('/api/uploadToIPFS', { method: 'POST', body: formData });
        if (!response.ok) throw new Error(`Upload failed: ${response.status}`);
        return await response.json();
      },
      
      async uploadImageToIPFS() {
        this.statusMsg.textContent = 'Converting image...';
        return new Promise((resolve, reject) => {
          this.canvas.toBlob(async (blob) => {
            if (!blob) { reject(new Error('Failed to convert canvas')); return; }
            const file = new File([blob], `snapshot_${Date.now()}.jpg`, { type: 'image/jpeg' });
            try { this.statusMsg.textContent = 'Uploading image to IPFS...'; resolve(await this.uploadFileToIPFS(file)); } catch (error) { reject(error); }
          }, 'image/jpeg', 0.85);
        });
      },
      
      async uploadVideoToIPFS(duration = 5000) {
        this.statusMsg.textContent = 'Recording video...';
        const stream = this.canvas.captureStream(30);
        let mimeType = 'video/mp4';
        if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
        const recorder = new MediaRecorder(stream, { mimeType });
        const chunks = [];
        return new Promise((resolve, reject) => {
          recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
          recorder.onstop = async () => {
            const ext = mimeType === 'video/mp4' ? 'mp4' : 'webm';
            const blob = new Blob(chunks, { type: mimeType });
            const file = new File([blob], `video_${Date.now()}.${ext}`, { type: mimeType });
            try { this.statusMsg.textContent = 'Uploading video to IPFS...'; resolve(await this.uploadFileToIPFS(file)); } catch (error) { reject(error); }
          };
          recorder.onerror = (err) => reject(err);
          recorder.start();
          setTimeout(() => { if (recorder.state === 'recording') recorder.stop(); }, duration);
        });
      },
      
      async uploadMetadataToIPFS(metadata) {
        this.statusMsg.textContent = 'Uploading metadata to IPFS...';
        const response = await fetch('/api/uploadMetadataToIPFS', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ metadata })
        });
        if (!response.ok) throw new Error(`Metadata upload failed: ${response.status}`);
        return await response.json();
      },
      
      // ============================================ //
      // NFT GENERATE - SAGATAVOTS SAVAM KONTRAKTAM
      // ============================================ //
      async generateNFT() {
        if (!this.account || !this.provider || !this.signer) { 
          this.statusMsg.textContent = 'Connect wallet first'; 
          this.showToast('Connect wallet first', 'warning');
          return; 
        }
        
        const userConfirmed = confirm(`Create NFT from your visualization?\n\nImage and video will be uploaded to IPFS.\n\nMinting will be added later with your own contract.\n\nDo you want to continue?`);
        if (!userConfirmed) { this.statusMsg.textContent = 'Cancelled'; return; }

        this.setButtonLoading(this.generateNFTBtn, true);
        this.showProgress();
        this.setProgress(10);
        
        try {
          // 1. Augšupielādē attēlu uz IPFS
          const imageResult = await this.uploadImageToIPFS();
          this.statusMsg.textContent = 'Image uploaded to IPFS';
          this.lastImageURL = imageResult;
          this.setProgress(30);
          
          // 2. Augšupielādē video uz IPFS
          let videoResult = null;
          try { 
            videoResult = await this.uploadVideoToIPFS(5000); 
            this.statusMsg.textContent = 'Video uploaded to IPFS'; 
            this.lastVideoURL = videoResult; 
            this.setProgress(50);
          } catch (error) { 
            console.warn('Video upload failed:', error); 
            this.showToast('Video upload failed, continuing without video', 'warning');
          }
          
          // 3. Ģenerē metadatus
          const metadata = {
            name: "Wallet Visualization NFT",
            description: `Generated from wallet ${this.account.substring(0, 10)}... on ${new Date().toISOString()}`,
            image: imageResult.ipfs,
            attributes: [
              { trait_type: "ETH Balance", value: this.ethBalance.toString() },
              { trait_type: "Token Count", value: this.tokens.length.toString() },
              { trait_type: "Transaction Count", value: this.txCount.toString() },
              { trait_type: "Visual Style", value: this.ADDON_STYLES[this.currentAddonStyle].name },
              { trait_type: "Generated At", value: new Date().toISOString() }
            ]
          };
          if (videoResult) metadata.animation_url = videoResult.ipfs;
          this.setProgress(70);
          
          // 4. Augšupielādē metadatus uz IPFS
          const metadataResult = await this.uploadMetadataToIPFS(metadata);
          this.statusMsg.textContent = 'Metadata uploaded to IPFS';
          this.lastMetadataURL = metadataResult;
          this.setProgress(85);
          
          // 5. Parāda preview
          this.showIPFSPreview(imageResult, videoResult, metadataResult);
          this.setProgress(100);
          
          // 6. Pagaidām tikai paziņojums - vēlāk šeit būs mint ar tavu kontraktu
          this.statusMsg.textContent = 'Ready to mint! Connect your smart contract here.';
          this.showToast('✅ Image, video and metadata uploaded to IPFS! Ready for minting.', 'success');
          alert(`✅ Files uploaded to IPFS!\n\nImage: ${imageResult.http}\nVideo: ${videoResult ? videoResult.http : 'N/A'}\nMetadata: ${metadataResult.http}\n\nMinting will be added later with your own contract.`);
          
        } catch (error) {
          console.error(error);
          this.statusMsg.textContent = `Error: ${error.message.substring(0, 100)}`;
          this.showToast(`Error: ${error.message.substring(0, 100)}`, 'error');
          alert(`NFT preparation failed: ${error.message}`);
        } finally { 
          this.setButtonLoading(this.generateNFTBtn, false); 
          this.hideProgress(); 
        }
      },
      
      async initParticlesOnce() {
        this.initialParticles = [];
        const particleCount = Math.min(150, 50 + (this.tokens.length || 0) * 15);
        const seedBase = (this.account || '') + String(this.ethBalance) + String(this.txCount);
        for (let i = 0; i < particleCount; i++) {
          const t = this.tokens.length ? this.tokens[i % this.tokens.length] : { balance: 1, address: String(i), symbol: 'T' };
          const balanceFactor = t.isNFT ? 1 : Math.min(t.balance || 0, 20) / 20;
          let hue = this.hashStringToInt((t.address || '') + seedBase + i) % 360;
          const ethFactor = Math.min(this.ethBalance / 10, 1);
          hue = (hue + ethFactor * 100) % 360;
          const speed = 0.005 + 0.01 * (this.hashStringToInt((t.symbol || t.address) + seedBase + i, 10) / 10);
          const r = t.isNFT ? 10 : 2 + 6 * balanceFactor;
          const angle = this.seededRandomFloat(seedBase + i + 'angle') * 2 * Math.PI;
          const radius = 50 + this.seededRandomFloat(seedBase + i + 'radius') * 400;
          this.initialParticles.push({ angle, radius, r, hue, speed, token: t, balanceFactor });
        }
      },
      
      cloneParticles() { return this.initialParticles.map(p => ({ ...p })); },
      
      drawFrame(frame, showTokensFrame) {
        this.frameCount = frame;
        const addon = this.ADDON_STYLES[this.currentAddonStyle];
        const { width: W, height: H } = this.canvas;
        
        this.ctx.clearRect(0, 0, W, H);
        this.ctx.fillStyle = '#000';
        this.ctx.fillRect(0, 0, W, H);
        
        const cx0 = W / 2, cy0 = H / 2;

        for (let i = 0; i < this.particles.length; i++) {
          const p1 = this.particles[i];
          const x1 = cx0 + Math.cos(p1.angle) * p1.radius;
          const y1 = cy0 + Math.sin(p1.angle) * p1.radius;
          
          for (let j = i + 1; j < this.particles.length; j++) {
            const p2 = this.particles[j];
            const x2 = cx0 + Math.cos(p2.angle) * p2.radius;
            const y2 = cy0 + Math.sin(p2.angle) * p2.radius;
            const dx = x1 - x2;
            const dy = y1 - y2;
            
            if (Math.abs(dx) > 120 || Math.abs(dy) > 120) continue;
            
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              const avgBalance = (Math.min(p1.token.balance, 20) + Math.min(p2.token.balance, 20)) / 40;
              let alpha = 0.2 + 0.4 * avgBalance * (1 - dist / 200);
              this.ctx.lineWidth = 1.5 + 2 * avgBalance;
              const txFactor = Math.log(this.txCount + 1) / 10;
              let hue = (p1.hue + p2.hue) / 2 + frame * 0.4 * txFactor;
              let sat = 100, light = 70;
              const modified = addon.connectionColorModifier(hue, sat, light, alpha);
              this.ctx.strokeStyle = `hsla(${modified.hue}, ${modified.sat}%, ${modified.light}%, ${modified.alpha})`;
              this.ctx.beginPath();
              this.ctx.moveTo(x1, y1);
              this.ctx.lineTo(x2, y2);
              this.ctx.stroke();
            }
          }
        }

        this.particles.forEach((p, idx) => {
          p.angle += p.speed;
          const cx = cx0 + Math.cos(p.angle) * p.radius;
          const cy = cy0 + Math.sin(p.angle) * p.radius;
          const modified = addon.particleColorModifier(p.hue, 100, 70, idx, p.balanceFactor);
          const gradient = this.ctx.createRadialGradient(cx, cy, 0, cx, cy, p.r * 2.5);
          gradient.addColorStop(0, `hsla(${modified.hue}, ${modified.sat}%, ${modified.light + 10}%, 1)`);
          gradient.addColorStop(0.5, `hsla(${modified.hue}, ${modified.sat}%, ${modified.light}%, 0.9)`);
          gradient.addColorStop(1, `hsla(${modified.hue + 20}, ${modified.sat}%, ${modified.light - 20}%, 0.5)`);
          this.ctx.fillStyle = gradient;
          this.ctx.beginPath();
          this.ctx.arc(cx, cy, p.r, 0, Math.PI * 2);
          this.ctx.fill();
        });

        addon.drawExtraEffects(this.ctx, W, H, frame, this.particles, cx0, cy0);

        if (showTokensFrame && this.showInfo) {
          this.ctx.fillStyle = '#0ff';
          this.ctx.font = '22px Inter';
          this.ctx.fillText(`SepoliaETH: ${this.ethBalance.toFixed(4)}`, 10, 80);
          this.ctx.font = '16px Inter';
          this.ctx.fillStyle = addon.color;
          this.ctx.fillText(`${addon.displayName} ACTIVE`, 10, 115);
          this.ctx.font = '12px Inter';
          this.ctx.fillStyle = '#888';
          this.ctx.fillText(addon.indicatorText.split(' - ')[1] || '', 10, 140);
        }
      },
      
      animate(frame = 0) { this.drawFrame(frame, true); this.animRequest = requestAnimationFrame(() => this.animate(frame + 1)); },
      stopAnimation() { if (this.animRequest) cancelAnimationFrame(this.animRequest); this.animRequest = null; },
      
      async renderSnapshot() {
        if (!this.account) await this.connectWallet();
        if (!this.provider || !this.account) { this.statusMsg.textContent = 'Wallet not connected'; return; }

        this.setButtonLoading(this.renderBtn, true);
        this.stopAnimation();
        this.cleanup();
        this.showProgress();
        this.progressBar.style.transform = 'scaleX(0)';
        this.statusMsg.textContent = '';

        const steps = [
          { name: 'ETH balance', func: async () => { this.ethBalance = Number(ethers.formatEther(await this.provider.getBalance(this.account))) || 0; }},
          { name: 'Transaction count', func: async () => { this.txCount = Number(await this.provider.getTransactionCount(this.account)) || 0; }},
          { name: 'ERC-20 tokens', func: async () => { this.tokens = await this.getTokens(); }},
          { name: 'NFTs', func: async () => { this.tokens = [...this.tokens, ...await this.getAllNFTs()]; }},
          { name: 'Visualization', func: async () => { await this.initParticlesOnce(); this.particles = this.cloneParticles(); }}
        ];

        let currentStep = 0, totalSteps = steps.length;
        let visualProgress = 0, running = true;

        const animateProgress = () => {
          if (!running) return;
          const targetProgress = currentStep / totalSteps;
          visualProgress += (targetProgress - visualProgress) * 0.05;
          this.progressBar.style.transform = `scaleX(${visualProgress})`;
          requestAnimationFrame(animateProgress);
        };
        requestAnimationFrame(animateProgress);

        try {
          for (const step of steps) {
            this.statusMsg.textContent = step.name + '...';
            await step.func();
            currentStep++;
          }
          if (this.showInfo) { this.tokenListContainer.style.display = 'block'; this.updateTokenListUI(); }
          running = false;
          this.progressBar.style.transform = 'scaleX(1)';
          this.statusMsg.textContent = `Ready - ${this.tokens.length} assets found`;
          this.hideProgress();
          this.animate();
          this.showToast(`Loaded ${this.tokens.length} assets`, 'success');
        } catch (e) {
          running = false;
          this.hideProgress();
          console.error(e);
          this.statusMsg.textContent = 'Render failed';
          this.showToast('Render failed: ' + e.message, 'error');
        } finally { this.setButtonLoading(this.renderBtn, false); }
      },
      
      pickSupportedMimeType() {
        const candidates = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
        for (const c of candidates) { try { if (MediaRecorder.isTypeSupported(c)) return c; } catch (e) {} }
        return '';
      },
      
      async startRecording() {
        if (this.isRecording) return;
        this.isRecording = true;
        const previousShowInfo = this.showInfo;
        
        this.showWarning('⚠️ Please do not close this tab while recording video! ⚠️', true);
        
        this.setButtonLoading(this.recordBtn, true);
        this.showInfo = false;
        this.tokenListContainer.style.display = 'block';
        this.stopAnimation();
        this.particles = this.cloneParticles();
        this.drawFrame(0, true);
        this.statusMsg.textContent = 'Preparing...';
        this.renderBtn.disabled = true;
        this.connectBtn.disabled = true;
        this.generateNFTBtn.disabled = true;
        this.showProgress();
        if (!this.animRequest) this.animate();

        let stream;
        try { stream = this.canvas.captureStream(30); } catch (err) { this.statusMsg.textContent = 'Not supported'; this.cleanupRecording(previousShowInfo); return; }

        const mime = this.pickSupportedMimeType();
        let recorder;
        try { recorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream); } catch (err) { alert('Recording not available'); this.cleanupRecording(previousShowInfo); return; }

        const chunks = [];
        recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
        recorder.onerror = (ev) => { console.error(ev); this.statusMsg.textContent = 'Error'; };
        recorder.onstart = () => { this.statusMsg.textContent = 'Recording...'; };
        recorder.start();

        const startTime = performance.now(), duration = 20000;
        const updateProgress = (timestamp) => {
          const elapsed = timestamp - startTime;
          const progress = Math.min(elapsed / duration, 1);
          this.progressBar.style.transform = `scaleX(${progress})`;
          const seconds = Math.floor(elapsed / 1000);
          this.recordTimer.textContent = `Recording: ${seconds} / 20 s`;
          if (elapsed < duration) requestAnimationFrame(updateProgress);
          else try { recorder.stop(); } catch (e) {}
        };
        requestAnimationFrame(updateProgress);

        recorder.onstop = () => {
          const blob = new Blob(chunks, { type: chunks.length ? chunks[0].type : 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.style.display = 'none';
          a.href = url;
          const ext = blob.type.includes('mp4') ? 'mp4' : 'webm';
          a.download = `visualization_${Date.now()}.${ext}`;
          document.body.appendChild(a);
          a.click();
          setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
          this.showInfo = previousShowInfo;
          this.tokenListContainer.style.display = this.showInfo ? 'block' : 'none';
          this.updateTokenListUI();
          this.statusMsg.textContent = 'Recording finished';
          this.recordTimer.textContent = 'Recording: 0 / 20 s';
          this.hideProgress();
          this.setButtonLoading(this.recordBtn, false);
          this.renderBtn.disabled = false;
          this.connectBtn.disabled = false;
          this.generateNFTBtn.disabled = false;
          this.isRecording = false;
          this.showWarning('', false);
          this.showToast('Video recorded successfully!', 'success');
        };
      },
      
      cleanupRecording(previousShowInfo) {
        this.showInfo = previousShowInfo;
        this.tokenListContainer.style.display = this.showInfo ? 'block' : 'none';
        this.updateTokenListUI();
        this.setButtonLoading(this.recordBtn, false);
        this.renderBtn.disabled = false;
        this.connectBtn.disabled = false;
        this.generateNFTBtn.disabled = false;
        this.hideProgress();
        this.recordTimer.textContent = 'Recording: 0 / 20 s';
        this.isRecording = false;
        this.showWarning('', false);
      },
      
      init() {
        this.canvas = document.getElementById('snapshotCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.connectBtn = document.getElementById('connectBtn');
        this.renderBtn = document.getElementById('renderBtn');
        this.recordBtn = document.getElementById('recordBtn');
        this.generateNFTBtn = document.getElementById('generateNFTBtn');
        this.accountDisplay = document.getElementById('accountDisplay');
        this.recordTimer = document.getElementById('recordTimer');
        this.statusMsg = document.getElementById('statusMsg');
        this.progressBarContainer = document.getElementById('progressBarContainer');
        this.progressBar = document.getElementById('progressBar');
        this.tokenListContainer = document.getElementById('tokenListContainer');
        this.tokenListContent = document.getElementById('tokenListContent');
        this.ipfsPreview = document.getElementById('ipfsPreview');
        this.previewImage = document.getElementById('previewImage');
        this.previewVideo = document.getElementById('previewVideo');
        this.previewMetadata = document.getElementById('previewMetadata');
        this.styleIndicator = document.getElementById('styleIndicator');
        this.indicatorText = document.getElementById('indicatorText');
        this.warningBanner = document.getElementById('warningBanner');
        
        this.connectBtn.addEventListener('click', () => this.connectWallet());
        this.renderBtn.addEventListener('click', () => this.renderSnapshot());
        this.generateNFTBtn.addEventListener('click', () => this.generateNFT());
        this.recordBtn.addEventListener('click', () => this.startRecording());
        
        document.querySelectorAll('.theme-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.setAddonStyle(btn.getAttribute('data-theme'));
          });
        });
        
        const fullscreenIcon = document.getElementById('fullscreenIcon');
        const toggleInfoIcon = document.getElementById('toggleInfoIcon');
        
        fullscreenIcon.addEventListener('click', () => { 
          if (!document.fullscreenElement) this.canvas.requestFullscreen().catch(() => {}); 
          else document.exitFullscreen().catch(() => {}); 
        });
        
        toggleInfoIcon.addEventListener('click', () => { 
          this.showInfo = !this.showInfo; 
          this.tokenListContainer.style.display = this.showInfo ? 'block' : 'none'; 
          if (this.showInfo) this.updateTokenListUI(); 
        });
        
        window.addEventListener('resize', () => this.resizeCanvas());
        this.resizeCanvas();
      }
    };
    
    App.init();
  </script>
