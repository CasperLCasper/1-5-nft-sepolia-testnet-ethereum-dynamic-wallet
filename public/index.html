<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dynamic Wallet Visualizer - NFT Collection</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    body { font-family:'Inter',Arial,sans-serif; background:#000; color:#fff; margin:0; padding:20px; position: relative; }
    .container { max-width:1400px; margin:auto; display:flex; flex-direction:column; align-items:center; gap:12px; }
    h1 { font-size:24px; margin:0; line-height:1; background:linear-gradient(90deg,#ffffff,#aaaaaa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; }
    .subtitle { margin-top:4px; color:#9fb0c3; font-size:18px; text-align:center; }
    
    .theme-selector {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 10px 0;
      flex-wrap: wrap;
    }
    .theme-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 2px solid;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
    }
    .theme-btn:hover { transform: translateY(-2px) scale(1.05); }
    .theme-btn.active { background: rgba(255,255,255,0.2); box-shadow: 0 0 15px currentColor; transform: scale(1.02); }
    .theme-btn.active::before { content: '✓ '; font-weight: bold; }
    .theme-classic { border-color: #0ff; color: #0ff; }
    .theme-forest { border-color: #0f0; color: #0f0; }
    .theme-ocean { border-color: #00f; color: #00f; }
    .theme-sunset { border-color: #ff6600; color: #ff6600; }
    .theme-galaxy { border-color: #c026ff; color: #c026ff; }
    .theme-rainbow { border-color: #ff00ff; color: #ff00ff; }
    .theme-fire { border-color: #ff4400; color: #ff4400; }
    
    .active-style-indicator {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      z-index: 100;
      border-left: 4px solid;
      pointer-events: none;
      font-family: monospace;
    }
    
    .controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    button { padding:12px 20px; border-radius:12px; border:none; cursor:pointer; background:linear-gradient(90deg,#4a90e2,#9013fe); color:#fff; font-weight:700; font-size:16px; box-shadow:0 6px 18px rgba(0,0,0,0.45); transition: transform 0.2s, box-shadow 0.2s; }
    button:disabled { background:#444; cursor:not-allowed; opacity:0.5; }
    button:hover:not(:disabled) { transform:translateY(-4px) scale(1.03); box-shadow:0 8px 22px rgba(0,0,0,0.65); }
    
    button.loading { opacity: 0.7; cursor: wait; transform: none !important; }
    button.loading::after {
      content: '';
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-left: 10px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .generate-nft-btn { background: linear-gradient(135deg, #ffffff, #e8f4f0); color: #000; }
    .generate-nft-btn:hover:not(:disabled) { background: linear-gradient(135deg, #d4fcec, #b8f5e0); color: #000; box-shadow: 0 8px 22px rgba(0,255,204,0.2); }
    .generate-nft-btn.loading::after { border-top-color: #000; }
    
    .admin-panel {
      background: rgba(0,255,255,0.1);
      border: 1px solid #0ff;
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
      width: 100%;
      max-width: 700px;
      display: none;
    }
    .admin-panel h3 { color: #0ff; margin-top: 0; }
    .admin-panel input, .admin-panel select { 
      padding: 10px; 
      border-radius: 8px; 
      border: 1px solid #333; 
      background: #111; 
      color: #fff; 
      margin: 5px;
      font-size: 14px;
    }
    .admin-panel button { background: linear-gradient(90deg,#0ff,#0a0); padding: 8px 16px; font-size: 14px; margin: 5px; }
    .admin-panel .field-group { margin: 15px 0; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .admin-panel code { background: #222; padding: 8px; border-radius: 6px; font-family: monospace; font-size: 12px; word-break: break-all; }
    
    .snapshot-container { width:100%; background:#000; border-radius:14px; padding:18px; box-shadow:0 12px 40px rgba(0,0,0,0.6); position:relative; }
    #snapshotCanvas { width:100%; border-radius:10px; border:1px solid rgba(255,255,255,0.03); display:block; margin-bottom:12px; }
    #recordTimer { margin-top:6px; color:#0ff; font-weight:600; font-size:16px; text-align:center; }
    #statusContainer { position: relative; width: 100%; height: 40px; margin-top: 8px; }
    .status { font-weight:600; font-size:16px; color:#fff; line-height:40px; text-align:center; }
    #progressBarContainer { position: absolute; top: 50%; left: 50%; width: 60%; height: 18px; background: rgba(255,255,255,0.1); border-radius: 6px; transform: translate(-50%, -50%); display: none; overflow: hidden; }
    #progressBar { height: 100%; width: 100%; background: linear-gradient(90deg,#0ff,#4a90e2); border-radius: 6px; transform: scaleX(0); transform-origin: left center; transition: transform 0.4s ease; }
    #fullscreenIcon { position:absolute; top:10px; right:10px; display:flex; align-items:center; cursor:pointer; color:#0ff; background:rgba(0,0,0,0.3); border-radius:6px; padding:6px 10px; transition: background 0.2s, transform 0.2s; z-index:10; }
    #fullscreenIcon:hover { background:rgba(0,255,255,0.2); transform: scale(1.05); }
    #toggleInfoIcon { position:absolute; top:10px; left:10px; display:flex; align-items:center; cursor:pointer; color:#0ff; background:rgba(0,0,0,0.3); border-radius:6px; padding:6px 10px; transition: background 0.2s, transform 0.2s; z-index:10; }
    #toggleInfoIcon:hover { background:rgba(0,255,255,0.2); transform: scale(1.05); }
    #accountDisplay { width:100%; word-break:break-word; margin-top:8px; font-size:16px; text-align:center; }

    .warning-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #f59e0b;
      color: #000;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      z-index: 200;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }
    .warning-banner.show { transform: translateY(0); }

    #tokenListContainer {
      display:none;
      position:absolute;
      top:80px;
      left:10px;
      max-height:150px;
      width:90%;
      max-width:576px;
      background:rgba(0,0,0,0.5);
      border-radius:9px;
      overflow-y:auto;
      padding:10px;
      font-size:14px;
      z-index:15;
    }
    #tokenListContainer table { width:100%; border-collapse:collapse; }
    #tokenListContainer th, #tokenListContainer td { padding:6px 8px; text-align:left; font-size:13px; }
    #tokenListContainer th { color:#0ff; font-weight:600; }
    #tokenListContainer tr:nth-child(even) td { background:rgba(255,255,255,0.05); }
    #tokenListContainer tr:nth-child(odd) td { background:rgba(255,255,255,0.02); }
    #tokenListContainer::-webkit-scrollbar { width:6px; }
    #tokenListContainer::-webkit-scrollbar-thumb { background:#0ff; border-radius:3px; }

    .site-header { position: relative; width: 100%; min-height: 80px; }
    .logo { position: absolute; top: 0px; left: 10px; width: 280px; height: auto; }
    .header-text { text-align: center; padding-top: 5px; }
    
    @media (max-width: 768px) {
      .logo { position: static; display: block; margin: 0 auto 20px auto; width: 140px; }
      .header-text { padding-top: 0; }
      .site-header { min-height: auto; }
    }
    
    .ipfs-preview {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.8);
      border: 1px solid #0ff;
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      max-width: 300px;
      z-index: 100;
      display: none;
    }
    .ipfs-preview a { color: #0ff; word-break: break-all; }
    
    .mint-btn { background: linear-gradient(135deg,#ffd700,#ff8c00); color: #000; }
    .mint-btn:hover:not(:disabled) { background: linear-gradient(135deg,#ffed4a,#ffaa33); }
  </style>
</head>

<body>
  <div class="warning-banner" id="warningBanner">
    ⚠️ Please do not close this tab while recording video! ⚠️
  </div>

  <div class="container">
    <header class="site-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="160" height="40" viewBox="0 0 158.74999 37.041668" class="logo">
        <text xml:space="preserve" style="font-style:normal;font-weight:normal;font-size:14.1111px;line-height:1.25;font-family:sans-serif;fill:#ffffff;fill-opacity:1;stroke:none;stroke-width:0.264583;" x="8.8499603" y="31.493832">
          <tspan x="8.8499603" y="31.493832" style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14.1111px;font-family:'DejaVu Sans Mono';-inkscape-font-specification:'DejaVu Sans Mono';stroke-width:0.264583;fill:#ffffff;">V I R S B U R T S</tspan>
        </text>
        <rect style="fill:#ffffff;stroke-width:0.264583" width="3.1013243" height="15.020124" x="5.9450045" y="3.8351295" />
      </svg>
      <div class="header-text">
        <h1>Dynamic Wallet Visualizer</h1>
        <p class="subtitle">Watch your Ethereum assets come alive</p>
      </div>
    </header>

    <div class="theme-selector">
      <button class="theme-btn theme-classic active" data-theme="classic">⭐ CLASSIC</button>
      <button class="theme-btn theme-forest" data-theme="forest">🌲 FOREST</button>
      <button class="theme-btn theme-ocean" data-theme="ocean">🌊 OCEAN</button>
      <button class="theme-btn theme-sunset" data-theme="sunset">🌅 SUNSET</button>
      <button class="theme-btn theme-galaxy" data-theme="galaxy">✨ GALAXY</button>
      <button class="theme-btn theme-rainbow" data-theme="rainbow">🌈 RAINBOW</button>
      <button class="theme-btn theme-fire" data-theme="fire">🔥 FIRE</button>
    </div>

    <div class="controls">
      <button id="connectBtn">Connect Wallet</button>
      <button id="renderBtn" disabled>Render Snapshot</button>
      <button id="recordBtn" disabled>Record 20s HD Video</button>
      <button id="generateNFTBtn" class="generate-nft-btn" disabled>Generate NFT</button>
    </div>

    <div id="accountDisplay">Connected account: —</div>
    <div id="statusContainer">
      <div id="statusMsg" class="status"></div>
      <div id="progressBarContainer"><div id="progressBar"></div></div>
    </div>
    <div id="recordTimer">Recording: 0 / 20 s</div>

    <!-- ADMIN PANELIS - redzams TIKAI līguma īpašniekam -->
    <div id="adminPanel" class="admin-panel">
      <h3>⚙️ ADMIN PANEL (Only you see this)</h3>
      
      <div class="field-group">
        <label>🚀 CREATE YOUR COLLECTION (ONE TIME):</label>
        <button id="createCollectionBtn" style="background: linear-gradient(90deg,#0f0,#0a0);">✨ CREATE MY NFT COLLECTION</button>
      </div>
      
      <div class="field-group">
        <label>📛 Collection Name:</label>
        <input type="text" id="collectionNameInput" placeholder="My NFT Collection" style="width: 200px;" />
        <button id="saveNameBtn">💾 Save</button>
      </div>
      
      <div class="field-group">
        <label>💰 Mint Price (ETH):</label>
        <select id="mintPriceSelect">
          <option value="0.005">0.005 ETH</option>
          <option value="0.01" selected>0.01 ETH</option>
          <option value="0.02">0.02 ETH</option>
          <option value="0.05">0.05 ETH</option>
          <option value="0.1">0.1 ETH</option>
        </select>
        <button id="savePriceBtn">💾 Save</button>
      </div>
      
      <div class="field-group">
        <label>🖼️ Base URI:</label>
        <input type="text" id="baseURIInput" placeholder="https://ipfs.io/ipfs/.../" style="width: 300px;" />
        <button id="saveURIBtn">💾 Save</button>
      </div>
      
      <div class="field-group">
        <label>📊 Your Collection Address:</label>
        <code id="collectionAddressDisplay">—</code>
        <button id="copyAddressBtn">📋 Copy</button>
      </div>
      
      <div class="field-group">
        <label>💳 Your Wallet (funds go here):</label>
        <code id="ownerAddressDisplay">—</code>
      </div>
    </div>

    <div class="snapshot-container">
      <canvas id="snapshotCanvas" width="1920" height="1080"></canvas>
      <div id="fullscreenIcon">⤢ <span>Fullscreen</span></div>
      <div id="toggleInfoIcon">ℹ <span>Info</span></div>
      <div id="tokenListContainer">
        <table>
          <thead><tr><th>Address</th><th>Balance</th> </tr>
          </thead>
          <tbody id="tokenListContent"></tbody>
        </table>
      </div>
    </div>
    
    <button id="mintBtn" class="mint-btn" style="padding: 15px 40px; font-size: 20px; margin-top: 10px;" disabled>💰 MINT NFT</button>
  </div>

  <div id="ipfsPreview" class="ipfs-preview" style="display:none;">
    <strong>IPFS Links:</strong><br>
    <span id="previewImage"></span><br>
    <span id="previewVideo"></span><br>
    <span id="previewMetadata"></span>
  </div>

  <div id="styleIndicator" class="active-style-indicator" style="border-left-color: #0ff;">
    <span id="indicatorText">⭐ CLASSIC MODE - Original visualization</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>

  <script>
    // ============================================ //
    // FACTORY LIGUMA KONFIGURACIJA
    // ============================================ //
    const FACTORY_ADDRESS = "0x5Adf6Ec92A02C18335293C1CAB21C9C725e14787";
    
    const FACTORY_ABI = [
      "function createCollection(string memory name, string memory symbol, string memory baseURI) external",
      "function getMyCollection() external view returns (address)",
      "function userCollection(address) external view returns (address)"
    ];
    
    const NFT_ABI = [
      "function mint(address to) payable",
      "function mintPrice() view returns (uint256)",
      "function setMintPrice(uint256) external",
      "function setBaseURI(string memory) external",
      "function setCollectionName(string memory) external",
      "function collectionName() view returns (string)",
      "function owner() view returns (address)",
      "function totalSupply() view returns (uint256)"
    ];

    // ============================================ //
    // SDK KONFIGURĀCIJAS BLOKS
    // ============================================ //
    const SDK_SETTINGS = {
      alchemyKey: "YOUR_ALCHEMY_API_KEY",
      alchemyNetwork: "eth-sepolia",
      manifoldContract: "0x0000000000000000000000000000000000000000",
      ipfsEndpoint: "/api/uploadToIPFS",
      ipfsMetadataEndpoint: "/api/uploadMetadataToIPFS",
      customUploader: null,
      network: "sepolia",
      mintFee: "0.01",
      getTokensEndpoint: "/api/getTokens",
      getNFTsEndpoint: "/api/getAllNFTs"
    };

    // ============================================ //
    // UI ELEMENTU KARTE
    // ============================================ //
    const UI = {
      connectBtn: document.getElementById('connectBtn'),
      renderBtn: document.getElementById('renderBtn'),
      recordBtn: document.getElementById('recordBtn'),
      generateNFTBtn: document.getElementById('generateNFTBtn'),
      mintBtn: document.getElementById('mintBtn'),
      accountDisplay: document.getElementById('accountDisplay'),
      recordTimer: document.getElementById('recordTimer'),
      statusMsg: document.getElementById('statusMsg'),
      progressBarContainer: document.getElementById('progressBarContainer'),
      progressBar: document.getElementById('progressBar'),
      tokenListContainer: document.getElementById('tokenListContainer'),
      tokenListContent: document.getElementById('tokenListContent'),
      ipfsPreview: document.getElementById('ipfsPreview'),
      previewImage: document.getElementById('previewImage'),
      previewVideo: document.getElementById('previewVideo'),
      previewMetadata: document.getElementById('previewMetadata'),
      styleIndicator: document.getElementById('styleIndicator'),
      indicatorText: document.getElementById('indicatorText'),
      warningBanner: document.getElementById('warningBanner'),
      canvas: document.getElementById('snapshotCanvas'),
      fullscreenIcon: document.getElementById('fullscreenIcon'),
      toggleInfoIcon: document.getElementById('toggleInfoIcon'),
      adminPanel: document.getElementById('adminPanel'),
      collectionNameInput: document.getElementById('collectionNameInput'),
      mintPriceSelect: document.getElementById('mintPriceSelect'),
      baseURIInput: document.getElementById('baseURIInput'),
      collectionAddressDisplay: document.getElementById('collectionAddressDisplay'),
      ownerAddressDisplay: document.getElementById('ownerAddressDisplay'),
      createCollectionBtn: document.getElementById('createCollectionBtn'),
      saveNameBtn: document.getElementById('saveNameBtn'),
      savePriceBtn: document.getElementById('savePriceBtn'),
      saveURIBtn: document.getElementById('saveURIBtn'),
      copyAddressBtn: document.getElementById('copyAddressBtn')
    };

    // ============================================ //
    // APP OBJECT
    // ============================================ //
    const App = {
      provider: null,
      signer: null,
      account: null,
      showInfo: true,
      tokens: [],
      ethBalance: 0,
      txCount: 0,
      particles: [],
      initialParticles: [],
      animRequest: null,
      currentAddonStyle: 'classic',
      frameCount: 0,
      isRecording: false,
      lastImageURL: null,
      lastVideoURL: null,
      lastMetadataURL: null,
      
      // NFT līguma dati
      factoryContract: null,
      userNFTContract: null,
      userNFTAddress: null,
      isOwner: false,
      
      // NFT Gravity - centrālie punkti
      nftCenters: [],
      
      getCanvasDimensions() {
        const isMobile = /Mobi|Android/i.test(navigator.userAgent);
        const dpr = Math.min(window.devicePixelRatio || 1, isMobile ? 2 : 3);
        let width = 1920;
        let height = 1080;
        if (isMobile) {
          width = Math.min(1080, window.innerWidth * dpr);
          height = Math.min(720, window.innerHeight * dpr);
        }
        return { width, height, dpr, isMobile };
      },
      
      resizeCanvas() {
        const { width, height, dpr, isMobile } = this.getCanvasDimensions();
        const scale = isMobile ? 0.5 : 1;
        UI.canvas.width = Math.round(width * scale);
        UI.canvas.height = Math.round(height * scale);
        UI.canvas.style.width = '100%';
        UI.canvas.style.height = 'auto';
        const ctx = UI.canvas.getContext('2d');
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr * scale, dpr * scale);
      },
      
      cleanup() {
        if (this.animRequest) {
          cancelAnimationFrame(this.animRequest);
          this.animRequest = null;
        }
        this.particles = [];
        this.initialParticles = [];
        this.nftCenters = [];
        const ctx = UI.canvas.getContext('2d');
        if (ctx) {
          ctx.clearRect(0, 0, UI.canvas.width, UI.canvas.height);
        }
      },
      
      showWarning(message, show = true) {
        if (UI.warningBanner) {
          UI.warningBanner.textContent = message;
          if (show) UI.warningBanner.classList.add('show');
          else UI.warningBanner.classList.remove('show');
        }
      },
      
      showToast(message, type = 'info') {
        UI.statusMsg.textContent = message;
        console.log(`[${type}] ${message}`);
      },
      
      showProgress() { UI.progressBarContainer.style.display = 'block'; UI.progressBar.style.transform = 'scaleX(0)'; },
      hideProgress() { 
        UI.progressBar.style.transform = 'scaleX(1)'; 
        setTimeout(() => { 
          UI.progressBarContainer.style.display = 'none'; 
          UI.progressBar.style.transform = 'scaleX(0)'; 
        }, 500); 
      },
      setProgress(percent) { UI.progressBar.style.transform = `scaleX(${percent / 100})`; },
      
      setButtonLoading(button, isLoading) { 
        if (isLoading) { button.classList.add('loading'); button.disabled = true; } 
        else { button.classList.remove('loading'); button.disabled = false; } 
      },
      
      // Tēmas
      ADDON_STYLES: {
        classic: { name: 'CLASSIC', displayName: '⭐ CLASSIC', color: '#0ff',
          particleColorModifier: (hue, sat, light, idx, balanceFactor, frameCount) => ({ hue, sat, light }),
          drawExtraEffects: (ctx, W, H, frame, particles, cx0, cy0) => {},
          connectionColorModifier: (hue, sat, light, alpha, frameCount) => ({ hue, sat, light, alpha }),
          indicatorText: '⭐ CLASSIC MODE - Original visualization' },
        forest: { name: 'FOREST', displayName: '🌲 FOREST', color: '#0f0',
          particleColorModifier: (hue, sat, light, idx, balanceFactor, frameCount) => ({ hue: (hue + 120) % 360, sat: Math.min(100, sat + 20), light: light - 10 }),
          drawExtraEffects: (ctx, W, H, frame, particles, cx0, cy0) => { ctx.save(); ctx.globalCompositeOperation = 'lighter'; particles.forEach(p => { const cx = cx0 + Math.cos(p.angle) * p.radius; const cy = cy0 + Math.sin(p.angle) * p.radius; ctx.beginPath(); ctx.arc(cx, cy, p.r * 1.8, 0, Math.PI * 2); ctx.fillStyle = `rgba(0, 255, 0, 0.15)`; ctx.fill(); }); ctx.restore(); },
          connectionColorModifier: (hue, sat, light, alpha, frameCount) => ({ hue: (hue + 120) % 360, sat: Math.min(100, sat + 20), light: light - 10, alpha: alpha * 0.8 }),
          indicatorText: '🌲 FOREST MODE - Green glow effect active' },
        ocean: { name: 'OCEAN', displayName: '🌊 OCEAN', color: '#00f',
          particleColorModifier: (hue, sat, light, idx, balanceFactor, frameCount) => ({ hue: (hue + 200) % 360, sat: Math.min(100, sat + 15), light: light + 5 }),
          drawExtraEffects: (ctx, W, H, frame, particles, cx0, cy0) => { ctx.save(); ctx.globalAlpha = 0.25; for(let i = 0; i < 5; i++) { ctx.beginPath(); ctx.arc(W/2 + Math.sin(frame * 0.02 + i) * 50, H/2 + Math.cos(frame * 0.015 + i) * 30, 100 + i * 30, 0, Math.PI * 2); ctx.strokeStyle = `rgba(0, 100, 255, ${0.15 - i * 0.02})`; ctx.stroke(); } ctx.restore(); },
          connectionColorModifier: (hue, sat, light, alpha, frameCount) => ({ hue: (hue + 200) % 360, sat: Math.min(100, sat + 15), light: light + 5, alpha: alpha * 0.9 }),
          indicatorText: '🌊 OCEAN MODE - Wave animations active' },
        sunset: { name: 'SUNSET', displayName: '🌅 SUNSET', color: '#ff6600',
          particleColorModifier: (hue, sat, light, idx, balanceFactor, frameCount) => ({ hue: (hue + 30) % 360, sat: Math.min(100, sat + 25), light: light + 15 }),
          drawExtraEffects: (ctx, W, H, frame, particles, cx0, cy0) => { ctx.save(); const gradient = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 350); gradient.addColorStop(0, 'rgba(255, 100, 0, 0.2)'); gradient.addColorStop(0.5, 'rgba(255, 50, 0, 0.1)'); gradient.addColorStop(1, 'rgba(255, 100, 0, 0)'); ctx.fillStyle = gradient; ctx.fillRect(0, 0, W, H); ctx.restore(); },

      hashStringToInt(str, mod = 1000) { 
        let h = 2166136261 >>> 0; 
        for (let i = 0; i < str.length; i++) {
          h ^= str.charCodeAt(i);
          h = Math.imul(h, 16777619) >>> 0;
        } 
        return h % mod; 
      },
      
      seededRandomFloat(seedStr) { 
        return this.hashStringToInt(seedStr, 10000) / 10000; 
      },
      
      updateNFTCenters() {
        this.nftCenters = [];
        const nftTokens = this.tokens.filter(t => t.isNFT);
        const { width: W, height: H } = UI.canvas;
        const cx0 = W / 2, cy0 = H / 2;
        
        nftTokens.forEach((nft, idx) => {
          const angle = this.seededRandomFloat(nft.address + 'position') * Math.PI * 2;
          const radius = 80 + this.seededRandomFloat(nft.address + 'radius') * 150;
          this.nftCenters.push({
            x: cx0 + Math.cos(angle) * radius,
            y: cy0 + Math.sin(angle) * radius,
            radius: 15,
            influence: 0.02,
            token: nft
          });
        });
      },

      async getTokens() {
        if (!this.account) return [];
        this.showProgress();
        try {
          const url = `${SDK_SETTINGS.getTokensEndpoint}?account=${encodeURIComponent(this.account)}`;
          const res = await fetch(url);
          if (!res.ok) return [];
          const data = await res.json();
          if (!data?.result?.tokenBalances) return [];
          return data.result.tokenBalances.map(t => {
            const decimals = t.decimals != null ? Number(t.decimals) : 18;
            const balance = Number(ethers.formatUnits(t.tokenBalance || "0x0", decimals));
            const address = (t.contractAddress || "").toLowerCase();
            return { address, balance, symbol: t.symbol || address, isNFT: false };
          }).filter(t => t.balance > 0);
        } catch(e) { console.error(e); return []; } finally { this.hideProgress(); }
      },
      
      async getAllNFTs() {
        if (!this.account) return [];
        this.showProgress();
        try {
          const url = `${SDK_SETTINGS.getNFTsEndpoint}?account=${encodeURIComponent(this.account)}`;
          const res = await fetch(url);
          if (!res.ok) return [];
          const data = await res.json();
          let nfts = [];
          if (data?.result?.nfts) nfts = data.result.nfts;
          else if (data?.nfts) nfts = data.nfts;

            address: nft.contract?.address || nft.contractAddress || nft.address || '',
            symbol: nft.contract?.symbol || nft.symbol || 'NFT',
            balance: 1,
            isNFT: true,
            tokenId: nft.id?.tokenId || nft.tokenId || nft.id || ''
          }));

        if (SDK_SETTINGS.customUploader && typeof SDK_SETTINGS.customUploader === 'function') {
          return await SDK_SETTINGS.customUploader(file);
        }
        const formData = new FormData();

      async uploadVideoToIPFS(duration = 5000) {
        this.showToast('Recording video...', 'info');
        const stream = UI.canvas.captureStream(30);
        let mimeType = 'video/mp4';
        if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
        const recorder = new MediaRecorder(stream, { mimeType });
        const chunks = [];
        return new Promise((resolve, reject) => {
          recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
          recorder.onstop = async () => {
            const ext = mimeType === 'video/mp4' ? 'mp4' : 'webm';
            const blob = new Blob(chunks, { type: mimeType });
            const file = new File([blob], `video_${Date.now()}.${ext}`, { type: mimeType });
            try { 
              this.showToast('Uploading video to IPFS...', 'info'); 
              resolve(await this.uploadFileToIPFS(file)); 
            } catch (error) { reject(error); }
          };
          recorder.onerror = (err) => reject(err);
          recorder.start();
          setTimeout(() => { if (recorder.state === 'recording') recorder.stop(); }, duration);
        });
      },

      async initParticlesOnce() {
        this.initialParticles = [];
        const particleCount = Math.min(120, 40 + (this.tokens.filter(t => !t.isNFT).length || 0) * 10);
        const seedBase = (this.account || '') + String(this.ethBalance) + String(this.txCount);
        
        this.updateNFTCenters();
        
        for (let i = 0; i < particleCount; i++) {
          const tokenIndex = i % (this.tokens.length || 1);
          const t = this.tokens.length ? this.tokens[tokenIndex] : { balance: 1, address: String(i), symbol: 'T', isNFT: false };
          const balanceFactor = t.isNFT ? 1 : Math.min(t.balance || 0, 20) / 20;
          
          let hue = this.hashStringToInt((t.address || '') + seedBase + i) % 360;
          const ethFactor = Math.min(this.ethBalance / 10, 1);
          hue = (hue + ethFactor * 100) % 360;
          
          const txSpeedFactor = Math.min(1 + Math.log(this.txCount + 1) / 15, 2.0);
          const speedBase = 0.003 + 0.008 * (this.hashStringToInt((t.symbol || t.address) + seedBase + i, 10) / 10);
          const speed = speedBase * txSpeedFactor;
          
          const r = t.isNFT ? 12 : 2 + 5 * balanceFactor;
          const angle = this.seededRandomFloat(seedBase + i + 'angle') * 2 * Math.PI;
          const radius = 60 + this.seededRandomFloat(seedBase + i + 'radius') * 380;
          
          this.initialParticles.push({ 
            angle, radius, r, hue, speed, 
            angleVelocity: speed,
            token: t, balanceFactor,
            x: 0, y: 0
          });
        }
      },
      
      cloneParticles() { 
        return this.initialParticles.map(p => ({ ...p, x: 0, y: 0 })); 
      },
      
      drawFrame(frame, showTokensFrame) {
        this.frameCount = frame;
        const addon = this.ADDON_STYLES[this.currentAddonStyle];
        const { width: W, height: H } = UI.canvas;
        const ctx = UI.canvas.getContext('2d');
        
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        
        const cx0 = W / 2, cy0 = H / 2;
        
        for (let i = 0; i < this.particles.length; i++) {
          const p = this.particles[i];
          
          let gravityDelta = { x: 0, y: 0 };
          for (const nft of this.nftCenters) {
            const dx = nft.x - (p.x || 0);
            const dy = nft.y - (p.y || 0);
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 0 && dist < 250) {
              const txFactor = Math.min(1 + Math.log(this.txCount + 1) / 15, 2.0);
              const force = nft.influence * (1 - dist / 250) * txFactor;
              gravityDelta.x += dx * force;
              gravityDelta.y += dy * force;
            }
          }
          
          const txSpeedFactor = Math.min(1 + Math.log(this.txCount + 1) / 15, 2.0);
          p.angleVelocity = (p.angleVelocity || p.speed) + (gravityDelta.x + gravityDelta.y) * 0.0005;
          p.angleVelocity = Math.min(Math.max(p.angleVelocity, 0.001), 0.025);
          p.angle += p.angleVelocity * txSpeedFactor;
          
          p.x = cx0 + Math.cos(p.angle) * p.radius;
          p.y = cy0 + Math.sin(p.angle) * p.radius;
        }
        
        for (let i = 0; i < this.particles.length; i++) {
          const p1 = this.particles[i];
          const x1 = p1.x;
          const y1 = p1.y;
          
          for (let j = i + 1; j < this.particles.length; j++) {
            const p2 = this.particles[j];
            const x2 = p2.x;
            const y2 = p2.y;
            const dx = x1 - x2;
            const dy = y1 - y2;
            
            if (Math.abs(dx) > 130 || Math.abs(dy) > 130) continue;
            
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 130 && dist > 0) {
              const avgBalance = (Math.min(p1.token.balance, 20) + Math.min(p2.token.balance, 20)) / 40;
              let alpha = 0.15 + 0.35 * avgBalance * (1 - dist / 130);
              ctx.lineWidth = 1.2 + 1.8 * avgBalance;
              let hue = (p1.hue + p2.hue) / 2 + frame * 0.3;
              const modified = addon.connectionColorModifier(hue, 100, 70, alpha, this.frameCount);
              ctx.strokeStyle = `hsla(${modified.hue}, ${modified.sat}%, ${modified.light}%, ${modified.alpha})`;
              ctx.beginPath();
              ctx.moveTo(x1, y1);
              ctx.lineTo(x2, y2);
              ctx.stroke();
            }
          }
        }
        
        for (let idx = 0; idx < this.particles.length; idx++) {
          const p = this.particles[idx];
          const cx = p.x;
          const cy = p.y;
          const modified = addon.particleColorModifier(p.hue, 100, 70, idx, p.balanceFactor, this.frameCount);
          
          const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, p.r * 2.2);
          gradient.addColorStop(0, `hsla(${modified.hue}, ${modified.sat}%, ${modified.light + 12}%, 1)`);
          gradient.addColorStop(0.6, `hsla(${modified.hue}, ${modified.sat}%, ${modified.light}%, 0.9)`);
          gradient.addColorStop(1, `hsla(${modified.hue + 20}, ${modified.sat}%, ${modified.light - 15}%, 0.4)`);
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(cx, cy, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
        
        for (const nft of this.nftCenters) {
          ctx.beginPath();
          ctx.arc(nft.x, nft.y, 8, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 215, 0, 0.3)`;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(nft.x, nft.y, 4, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 215, 0, 0.8)`;
          ctx.fill();
        }
        
        addon.drawExtraEffects(ctx, W, H, frame, this.particles, cx0, cy0);
        
        if (showTokensFrame && this.showInfo) {
          ctx.fillStyle = '#0ff';
          ctx.font = '20px Inter';
          ctx.fillText(`ETH: ${this.ethBalance.toFixed(4)}`, 15, 70);
          ctx.font = '14px Inter';
          ctx.fillStyle = addon.color;
          ctx.fillText(`${addon.displayName} ACTIVE`, 15, 100);
          ctx.font = '11px Inter';
          ctx.fillStyle = '#888';
          ctx.fillText(`TX count: ${this.txCount} | NFTs: ${this.nftCenters.length}`, 15, 125);
        }
      },
      
      animate(frame = 0) { 
        this.drawFrame(frame, true); 
        this.animRequest = requestAnimationFrame(() => this.animate(frame + 1)); 
      },
      
      stopAnimation() { 
        if (this.animRequest) cancelAnimationFrame(this.animRequest); 
        this.animRequest = null; 
      },
      
      async renderSnapshot() {
        if (!this.account) await this.connectWallet();
        if (!this.provider || !this.account) { this.showToast('Wallet not connected', 'warning'); return; }

        this.setButtonLoading(UI.renderBtn, true);
        this.stopAnimation();
        this.cleanup();
        this.showProgress();
        UI.progressBar.style.transform = 'scaleX(0)';
        this.showToast('Loading wallet data...', 'info');

        const steps = [
          { name: 'ETH balance', func: async () => { this.ethBalance = Number(ethers.formatEther(await this.provider.getBalance(this.account))) || 0; }},
          { name: 'Transaction count', func: async () => { this.txCount = Number(await this.provider.getTransactionCount(this.account)) || 0; }},
          { name: 'ERC-20 tokens', func: async () => { this.tokens = await this.getTokens(); }},
          { name: 'NFTs', func: async () => { 
              const nfts = await this.getAllNFTs();
              this.tokens = [...this.tokens, ...nfts];
              this.updateNFTCenters();
            }},
          { name: 'Visualization', func: async () => { await this.initParticlesOnce(); this.particles = this.cloneParticles(); }}
        ];

        let currentStep = 0, totalSteps = steps.length;
        let visualProgress = 0, running = true;

        const animateProgress = () => {
          if (!running) return;
          const targetProgress = currentStep / totalSteps;
          visualProgress += (targetProgress - visualProgress) * 0.05;
          UI.progressBar.style.transform = `scaleX(${visualProgress})`;
          requestAnimationFrame(animateProgress);
        };
        requestAnimationFrame(animateProgress);

        try {
          for (const step of steps) {
            this.showToast(step.name + '...', 'info');
            await step.func();
            currentStep++;
          }
          if (this.showInfo) { UI.tokenListContainer.style.display = 'block'; this.updateTokenListUI(); }
          running = false;
          UI.progressBar.style.transform = 'scaleX(1)';
          this.showToast(`Ready - ${this.tokens.length} assets found`, 'success');
          this.hideProgress();
          this.animate();
        } catch (e) {
          running = false;
          this.hideProgress();
          console.error(e);
          this.showToast('Render failed: ' + e.message, 'error');
        } finally { this.setButtonLoading(UI.renderBtn, false); }
      },
      
      pickSupportedMimeType() {
        const candidates = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
        for (const c of candidates) { try { if (MediaRecorder.isTypeSupported(c)) return c; } catch (e) {} }
        return '';
      },
      
      async startRecording() {
        if (this.isRecording) return;
        this.isRecording = true;
        const previousShowInfo = this.showInfo;
        
        this.showWarning('⚠️ Please do not close this tab while recording video! ⚠️', true);
        
        this.setButtonLoading(UI.recordBtn, true);
        this.showInfo = false;
        UI.tokenListContainer.style.display = 'block';
        this.stopAnimation();
        this.particles = this.cloneParticles();
        this.drawFrame(0, true);
        this.showToast('Preparing...', 'info');
        UI.renderBtn.disabled = true;
        UI.connectBtn.disabled = true;
        UI.generateNFTBtn.disabled = true;
        this.showProgress();
        if (!this.animRequest) this.animate();

        let stream;
        try { stream = UI.canvas.captureStream(30); } catch (err) { this.showToast('Not supported', 'error'); this.cleanupRecording(previousShowInfo); return; }

        const mime = this.pickSupportedMimeType();
        let recorder;
        try { recorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream); } catch (err) { alert('Recording not available'); this.cleanupRecording(previousShowInfo); return; }

        const chunks = [];
        recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
        recorder.onerror = (ev) => { console.error(ev); this.showToast('Error', 'error'); };
        recorder.onstart = () => { this.showToast('Recording...', 'info'); };
        recorder.start();

        const startTime = performance.now(), duration = 20000;
        const updateProgress = (timestamp) => {
          const elapsed = timestamp - startTime;
          const progress = Math.min(elapsed / duration, 1);
          UI.progressBar.style.transform = `scaleX(${progress})`;
          const seconds = Math.floor(elapsed / 1000);
          UI.recordTimer.textContent = `Recording: ${seconds} / 20 s`;
          if (elapsed < duration) requestAnimationFrame(updateProgress);
          else try { recorder.stop(); } catch (e) {}
        };
        requestAnimationFrame(updateProgress);

        recorder.onstop = () => {
          const blob = new Blob(chunks, { type: chunks.length ? chunks[0].type : 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.style.display = 'none';
          a.href = url;
          const ext = blob.type.includes('mp4') ? 'mp4' : 'webm';
          a.download = `visualization_${Date.now()}.${ext}`;
          document.body.appendChild(a);
          a.click();
          setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
          this.showInfo = previousShowInfo;
          UI.tokenListContainer.style.display = this.showInfo ? 'block' : 'none';
          this.updateTokenListUI();
          this.showToast('Recording finished', 'success');
          UI.recordTimer.textContent = 'Recording: 0 / 20 s';
          this.hideProgress();
          this.setButtonLoading(UI.recordBtn, false);
          UI.renderBtn.disabled = false;
          UI.connectBtn.disabled = false;
          UI.generateNFTBtn.disabled = false;
          this.isRecording = false;
          this.showWarning('', false);
        };
      },
      
      cleanupRecording(previousShowInfo) {
        this.showInfo = previousShowInfo;
        UI.tokenListContainer.style.display = this.showInfo ? 'block' : 'none';
        this.updateTokenListUI();
        this.setButtonLoading(UI.recordBtn, false);
        UI.renderBtn.disabled = false;
        UI.connectBtn.disabled = false;
        UI.generateNFTBtn.disabled = false;
        this.hideProgress();
        UI.recordTimer.textContent = 'Recording: 0 / 20 s';
        this.isRecording = false;
        this.showWarning('', false);
      },
      
      init() {
        this.resizeCanvas();
        
        UI.connectBtn.addEventListener('click', () => this.connectWallet());
        UI.renderBtn.addEventListener('click', () => this.renderSnapshot());
        UI.generateNFTBtn.addEventListener('click', () => this.generateNFT());
        UI.recordBtn.addEventListener('click', () => this.startRecording());
        UI.mintBtn.addEventListener('click', () => this.mintNFT());
        UI.createCollectionBtn.addEventListener('click', () => this.createCollection());
        UI.saveNameBtn.addEventListener('click', () => this.saveCollectionName());
        UI.savePriceBtn.addEventListener('click', () => this.saveMintPrice());
        UI.saveURIBtn.addEventListener('click', () => this.saveBaseURI());
        
        UI.copyAddressBtn.addEventListener('click', () => {
          if (this.userNFTAddress) {
            navigator.clipboard.writeText(this.userNFTAddress);
            this.showToast('📋 Address copied!');
          }
        });
        
        document.querySelectorAll('.theme-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.setAddonStyle(btn.getAttribute('data-theme'));
          });
        });
        
        UI.fullscreenIcon.addEventListener('click', () => { 
          if (!document.fullscreenElement) UI.canvas.requestFullscreen().catch(() => {}); 
          else document.exitFullscreen().catch(() => {}); 
        });
        
        UI.toggleInfoIcon.addEventListener('click', () => { 
          this.showInfo = !this.showInfo; 
          UI.tokenListContainer.style.display = this.showInfo ? 'block' : 'none'; 
          if (this.showInfo) this.updateTokenListUI(); 
        });
        
        window.addEventListener('resize', () => this.resizeCanvas());
      }
    };
    
    App.init();
  </script>
</body>
</html>
