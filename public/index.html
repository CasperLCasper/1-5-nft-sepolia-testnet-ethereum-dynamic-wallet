<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dynamic Wallet Visualizer - NFT Collection</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    body { font-family:'Inter',Arial,sans-serif; background:#000; color:#fff; margin:0; padding:20px; position: relative; }
    .container { max-width:1400px; margin:auto; display:flex; flex-direction:column; align-items:center; gap:12px; }
    h1 { font-size:24px; margin:0; line-height:1; background:linear-gradient(90deg,#ffffff,#aaaaaa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; }
    .subtitle { margin-top:4px; color:#9fb0c3; font-size:18px; text-align:center; }
    
    .controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:10px 0; }
    button { padding:12px 20px; border-radius:12px; border:none; cursor:pointer; background:linear-gradient(90deg,#4a90e2,#9013fe); color:#fff; font-weight:700; font-size:16px; box-shadow:0 6px 18px rgba(0,0,0,0.45); transition: transform 0.2s, box-shadow 0.2s; }
    button:disabled { background:#444; cursor:not-allowed; opacity:0.5; }
    button:hover:not(:disabled) { transform:translateY(-4px) scale(1.03); box-shadow:0 8px 22px rgba(0,0,0,0.65); }
    
    .admin-panel { background: rgba(0,255,255,0.1); border: 1px solid #0ff; border-radius: 16px; padding: 20px; margin: 20px 0; width: 100%; max-width: 600px; }
    .admin-panel h3 { color: #0ff; margin-top: 0; }
    .admin-panel input, .admin-panel select { padding: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; margin: 5px; }
    .admin-panel button { background: linear-gradient(90deg,#0ff,#0a0); padding: 8px 16px; font-size: 14px; }
    .admin-panel .field-group { margin: 15px 0; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    
    .snapshot-container { width:100%; background:#000; border-radius:14px; padding:18px; box-shadow:0 12px 40px rgba(0,0,0,0.6); position:relative; }
    #snapshotCanvas { width:100%; border-radius:10px; border:1px solid rgba(255,255,255,0.03); display:block; margin-bottom:12px; background: #000; }
    
    #accountDisplay { width:100%; word-break:break-word; margin-top:8px; font-size:16px; text-align:center; }
    .status { font-weight:600; font-size:16px; color:#fff; text-align:center; margin:10px 0; }
    
    .theme-selector { display: flex; gap: 12px; justify-content: center; margin: 10px 0; flex-wrap: wrap; }
    .theme-btn { padding: 8px 16px; border-radius: 20px; border: 2px solid; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s ease; background: rgba(0,0,0,0.6); }
    .theme-btn.active { background: rgba(255,255,255,0.2); box-shadow: 0 0 15px currentColor; }
    .theme-classic { border-color: #0ff; color: #0ff; }
    .theme-forest { border-color: #0f0; color: #0f0; }
    .theme-ocean { border-color: #00f; color: #00f; }
    .theme-sunset { border-color: #ff6600; color: #ff6600; }
    .theme-galaxy { border-color: #c026ff; color: #c026ff; }
    .theme-rainbow { border-color: #ff00ff; color: #ff00ff; }
    .theme-fire { border-color: #ff4400; color: #ff4400; }
    
    .warning-banner { position: fixed; top: 0; left: 0; right: 0; background: #f59e0b; color: #000; text-align: center; padding: 8px; font-size: 12px; font-weight: 600; z-index: 200; transform: translateY(-100%); transition: transform 0.3s ease; }
    .warning-banner.show { transform: translateY(0); }
    
    .logo { text-align: center; margin-bottom: 20px; font-size: 24px; font-weight: bold; letter-spacing: 4px; }
  </style>
</head>

<body>
  <div class="warning-banner" id="warningBanner">
    ⚠️ Please do not close this tab while recording video! ⚠️
  </div>

  <div class="container">
    <div class="logo">🎨 VIRSBURTS NFT</div>
    <h1>Dynamic Wallet Visualizer</h1>
    <p class="subtitle">Watch your Ethereum assets come alive</p>

    <div class="controls">
      <button id="connectBtn">🔌 Connect Wallet</button>
      <button id="renderBtn" disabled>🎨 Render Snapshot</button>
      <button id="recordBtn" disabled>🎬 Record 20s Video</button>
    </div>

    <div id="accountDisplay">Connected account: —</div>
    <div id="statusMsg" class="status"></div>

    <!-- ADMIN PANELIS - redzams TIKAI līguma īpašniekam -->
    <div id="adminPanel" class="admin-panel" style="display: none;">
      <h3>⚙️ ADMIN PANEL (Only you see this)</h3>
      
      <div class="field-group">
        <label>📛 Collection Name:</label>
        <input type="text" id="collectionName" placeholder="My NFT Collection" />
        <button id="saveNameBtn">💾 Save</button>
      </div>
      
      <div class="field-group">
        <label>💰 Mint Price (ETH):</label>
        <select id="mintPrice">
          <option value="0.005">0.005 ETH</option>
          <option value="0.01" selected>0.01 ETH</option>
          <option value="0.02">0.02 ETH</option>
          <option value="0.05">0.05 ETH</option>
          <option value="0.1">0.1 ETH</option>
        </select>
        <button id="savePriceBtn">💾 Save</button>
      </div>
      
      <div class="field-group">
        <label>🖼️ Base URI (metadata):</label>
        <input type="text" id="baseURI" placeholder="https://ipfs.io/ipfs/.../" style="width: 300px;" />
        <button id="saveURIBtn">💾 Save</button>
      </div>
      
      <div class="field-group">
        <label>📊 Your Collection Address:</label>
        <code id="collectionAddressDisplay" style="background:#222; padding:8px; border-radius:6px; word-break:break-all;">—</code>
        <button id="copyAddressBtn">📋 Copy</button>
      </div>
      
      <div class="field-group">
        <label>💳 Your Wallet (funds go here):</label>
        <code id="ownerAddressDisplay" style="background:#222; padding:8px; border-radius:6px;">—</code>
      </div>
      
      <hr />
      <div class="field-group">
        <button id="createCollectionBtn" style="background: linear-gradient(90deg,#0f0,#0a0);">✨ CREATE MY NFT COLLECTION (ONE TIME)</button>
      </div>
      <p style="font-size: 12px; color: #888;">⚠️ This will deploy your own NFT contract. Only do this once!</p>
    </div>

    <div class="snapshot-container">
      <canvas id="snapshotCanvas" width="1920" height="1080"></canvas>
      <div style="display: flex; justify-content: space-between; margin-top: 10px;">
        <button id="mintBtn" disabled style="background: linear-gradient(135deg,#ffd700,#ff8c00);">💰 MINT NFT</button>
        <button id="fullscreenBtn">⤢ Fullscreen</button>
      </div>
    </div>

    <div class="theme-selector">
      <button class="theme-btn theme-classic active" data-theme="classic">⭐ CLASSIC</button>
      <button class="theme-btn theme-forest" data-theme="forest">🌲 FOREST</button>
      <button class="theme-btn theme-ocean" data-theme="ocean">🌊 OCEAN</button>
      <button class="theme-btn theme-sunset" data-theme="sunset">🌅 SUNSET</button>
      <button class="theme-btn theme-galaxy" data-theme="galaxy">✨ GALAXY</button>
      <button class="theme-btn theme-rainbow" data-theme="rainbow">🌈 RAINBOW</button>
      <button class="theme-btn theme-fire" data-theme="fire">🔥 FIRE</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>

  <script>
    // ============================================ //
    // KONFIGURĀCIJA
    // ============================================ //
    const FACTORY_ADDRESS = "0x5Adf6Ec92A02C18335293C1CAB21C9C725e14787";
    
    // Factory ABI
    const FACTORY_ABI = [
      "function createCollection(string memory name, string memory symbol, string memory baseURI) external",
      "function getMyCollection() external view returns (address)",
      "function userCollection(address) external view returns (address)"
    ];
    
    // NFT līguma ABI (pēc izveides)
    const NFT_ABI = [
      "function mint(address to) payable",
      "function mintPrice() view returns (uint256)",
      "function setMintPrice(uint256) external",
      "function setBaseURI(string memory) external",
      "function setCollectionName(string memory) external",
      "function collectionName() view returns (string)",
      "function owner() view returns (address)",
      "function totalSupply() view returns (uint256)"
    ];
    
    // ============================================ //
    // APP STĀVOKLIS
    // ============================================ //
    let provider, signer, userAddress;
    let factoryContract;
    let userNFTContract = null;
    let userNFTAddress = null;
    let isOwner = false;
    let currentTheme = 'classic';
    
    // DOM elementi
    const connectBtn = document.getElementById('connectBtn');
    const renderBtn = document.getElementById('renderBtn');
    const recordBtn = document.getElementById('recordBtn');
    const mintBtn = document.getElementById('mintBtn');
    const adminPanel = document.getElementById('adminPanel');
    const collectionAddressDisplay = document.getElementById('collectionAddressDisplay');
    const ownerAddressDisplay = document.getElementById('ownerAddressDisplay');
    const createCollectionBtn = document.getElementById('createCollectionBtn');
    const saveNameBtn = document.getElementById('saveNameBtn');
    const savePriceBtn = document.getElementById('savePriceBtn');
    const saveURIBtn = document.getElementById('saveURIBtn');
    const collectionNameInput = document.getElementById('collectionName');
    const mintPriceSelect = document.getElementById('mintPrice');
    const baseURIInput = document.getElementById('baseURI');
    const copyAddressBtn = document.getElementById('copyAddressBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const canvas = document.getElementById('snapshotCanvas');
    const statusMsg = document.getElementById('statusMsg');
    const accountDisplay = document.getElementById('accountDisplay');
    
    // ============================================ //
    // PALĪGFUNKCIJAS
    // ============================================ //
    function showStatus(msg, isError = false) {
      statusMsg.textContent = msg;
      statusMsg.style.color = isError ? '#ff6666' : '#0f0';
      console.log(msg);
      setTimeout(() => {
        if (statusMsg.textContent === msg) statusMsg.style.color = '#fff';
      }, 3000);
    }
    
    // ============================================ //
    // SAVIENOŠANA AR MAKU
    // ============================================ //
    async function connectWallet() {
      if (!window.ethereum) {
        alert('Please install MetaMask!');
        return;
      }
      
      try {
        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        userAddress = await signer.getAddress();
        
        accountDisplay.textContent = `Connected: ${userAddress.substring(0, 10)}...${userAddress.substring(38)}`;
        
        // Izveido Factory līguma instanci
        factoryContract = new ethers.Contract(FACTORY_ADDRESS, FACTORY_ABI, signer);
        
        // Pārbauda vai lietotājam jau ir kolekcija
        await checkUserCollection();
        
        renderBtn.disabled = false;
        recordBtn.disabled = false;
        
        showStatus(`✅ Connected: ${userAddress.substring(0, 10)}...`);
      } catch (err) {
        console.error(err);
        showStatus('❌ Connection failed', true);
      }
    }
    
    // ============================================ //
    // PĀRBAUDI VAI LIETOTĀJAM IR KOLEKCIJA
    // ============================================ //
    async function checkUserCollection() {
      try {
        userNFTAddress = await factoryContract.getMyCollection();
        
        if (userNFTAddress && userNFTAddress !== "0x0000000000000000000000000000000000000000") {
          userNFTContract = new ethers.Contract(userNFTAddress, NFT_ABI, signer);
          collectionAddressDisplay.textContent = userNFTAddress;
          
          // Pārbauda vai lietotājs ir īpašnieks
          const contractOwner = await userNFTContract.owner();
          isOwner = (contractOwner.toLowerCase() === userAddress.toLowerCase());
          
          if (isOwner) {
            adminPanel.style.display = 'block';
            mintBtn.disabled = false;
            ownerAddressDisplay.textContent = userAddress;
            
            // Ielādē pašreizējos iestatījumus
            await loadContractSettings();
            showStatus('✅ Your collection is ready!');
          } else {
            mintBtn.disabled = false;
            showStatus('✅ Collection found! You can mint NFTs.');
          }
        } else {
          // Nav kolekcijas - rāda izveides pogu tikai īpašniekam (šajā gadījumā - lietotājam)
          // Bet pagaidām - jebkurš var izveidot
          adminPanel.style.display = 'block';
          showStatus('⚠️ No collection yet. Click "CREATE MY NFT COLLECTION"');
        }
      } catch (err) {
        console.error("Check collection error:", err);
        adminPanel.style.display = 'block';
      }
    }
    
    // ============================================ //
    // IELĀDĒ KONTRAKTA IESTATĪJUMUS
    // ============================================ //
    async function loadContractSettings() {
      if (!userNFTContract) return;
      
      try {
        const name = await userNFTContract.collectionName();
        const price = await userNFTContract.mintPrice();
        collectionNameInput.value = name;
        mintPriceSelect.value = ethers.formatEther(price);
      } catch (err) {
        console.error("Load settings error:", err);
      }
    }
    
    // ============================================ //
    // IZVEIDOT KOLEKCIJU
    // ============================================ //
    async function createCollection() {
      if (!factoryContract) {
        showStatus('Please connect wallet first!', true);
        return;
      }
      
      const name = collectionNameInput.value || "My NFT Collection";
      const symbol = name.substring(0, 6).toUpperCase().replace(/[^A-Z]/g, '');
      const baseURI = baseURIInput.value || "https://ipfs.io/ipfs/QmExample/";
      
      showStatus('🚀 Creating your NFT collection... Please confirm in MetaMask');
      
      try {
        const tx = await factoryContract.createCollection(name, symbol, baseURI);
        await tx.wait();
        
        showStatus('✅ Collection created! Refreshing...');
        await checkUserCollection();
      } catch (err) {
        console.error(err);
        showStatus('❌ Failed to create collection: ' + err.message, true);
      }
    }
    
    // ============================================ //
    // SAGLABĀT IESTATĪJUMUS
    // ============================================ //
    async function saveCollectionName() {
      if (!userNFTContract || !isOwner) return;
      try {
        const tx = await userNFTContract.setCollectionName(collectionNameInput.value);
        await tx.wait();
        showStatus('✅ Collection name updated!');
      } catch (err) {
        showStatus('❌ Failed: ' + err.message, true);
      }
    }
    
    async function saveMintPrice() {
      if (!userNFTContract || !isOwner) return;
      try {
        const priceInWei = ethers.parseEther(mintPriceSelect.value);
        const tx = await userNFTContract.setMintPrice(priceInWei);
        await tx.wait();
        showStatus('✅ Mint price updated!');
      } catch (err) {
        showStatus('❌ Failed: ' + err.message, true);
      }
    }
    
    async function saveBaseURI() {
      if (!userNFTContract || !isOwner) return;
      try {
        const tx = await userNFTContract.setBaseURI(baseURIInput.value);
        await tx.wait();
        showStatus('✅ Base URI updated!');
      } catch (err) {
        showStatus('❌ Failed: ' + err.message, true);
      }
    }
    
    // ============================================ //
    // MINT NFT
    // ============================================ //
    async function mintNFT() {
      if (!userNFTContract) {
        showStatus('No collection found! Create one first.', true);
        return;
      }
      
      try {
        const price = await userNFTContract.mintPrice();
        const priceEth = ethers.formatEther(price);
        
        showStatus(`🔄 Minting NFT for ${priceEth} ETH... Confirm in MetaMask`);
        
        const tx = await userNFTContract.mint(userAddress, { value: price });
        await tx.wait();
        
        showStatus(`✅ NFT Minted! Token ID: ${(await userNFTContract.totalSupply()) - 1}`);
      } catch (err) {
        console.error(err);
        showStatus('❌ Mint failed: ' + err.message, true);
      }
    }
    
    // ============================================ //
    // VIZUALIZĀCIJA (vienkāršota versija)
    // ============================================ //
    function drawVisualization() {
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, w, h);
      
      // Vienkārša daļiņu animācija
      const time = Date.now() / 1000;
      const cx = w/2, cy = h/2;
      
      for (let i = 0; i < 50; i++) {
        const angle = i * 0.125 + time;
        const radius = 100 + Math.sin(time * 0.5 + i) * 50;
        const x = cx + Math.cos(angle) * radius;
        const y = cy + Math.sin(angle) * radius;
        
        let hue;
        switch(currentTheme) {
          case 'forest': hue = 120; break;
          case 'ocean': hue = 200; break;
          case 'sunset': hue = 30; break;
          case 'galaxy': hue = 280; break;
          case 'rainbow': hue = (time * 50 + i * 36) % 360; break;
          case 'fire': hue = 15; break;
          default: hue = 180;
        }
        
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
        ctx.fill();
      }
    }
    
    function animate() {
      drawVisualization();
      requestAnimationFrame(animate);
    }
    
    // ============================================ //
    // TĒMAS
    // ============================================ //
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTheme = btn.getAttribute('data-theme');
      });
    });
    
    // ============================================ //
    // NOTIKUMI
    // ============================================ //
    connectBtn.addEventListener('click', connectWallet);
    createCollectionBtn.addEventListener('click', createCollection);
    saveNameBtn.addEventListener('click', saveCollectionName);
    savePriceBtn.addEventListener('click', saveMintPrice);
    saveURIBtn.addEventListener('click', saveBaseURI);
    mintBtn.addEventListener('click', mintNFT);
    
    copyAddressBtn.addEventListener('click', () => {
      if (userNFTAddress) {
        navigator.clipboard.writeText(userNFTAddress);
        showStatus('📋 Address copied!');
      }
    });
    
    fullscreenBtn.addEventListener('click', () => {
      if (canvas.requestFullscreen) canvas.requestFullscreen();
    });
    
    renderBtn.addEventListener('click', () => {
      showStatus('🎨 Visualization active!');
      animate();
    });
    
    recordBtn.addEventListener('click', () => {
      showStatus('📹 Recording not implemented in this demo');
    });
    
    // Sākotnējais canvasa izmērs
    canvas.width = 800;
    canvas.height = 450;
    drawVisualization();
    animate();
    
  </script>
</body>
</html>
